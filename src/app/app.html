<main class="min-h-screen bg-slate-900 flex items-center justify-center p-4 md:p-8">
    <div class="bg-white p-6 md:p-12 rounded-2xl shadow-2xl text-center w-full max-w-2xl">
        <h1 class="text-3xl md:text-5xl font-extrabold text-amber-600 mb-4 transition-all">
            Origens by Domingo Navarro
        </h1>

        <nav class="flex justify-center gap-4 mb-8">
            <a routerLink="/" class="px-6 py-2 bg-amber-600 text-white font-semibold rounded-full hover:bg-amber-700 transition-colors"
                routerLinkActive="bg-amber-800 ring-4 ring-amber-300"
                [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
            <a routerLink="/carta" class="px-6 py-2 bg-amber-600 text-white font-semibold rounded-full hover:bg-amber-700 transition-colors"
                routerLinkActive="bg-amber-800 ring-4 ring-amber-300">Carta</a>
        </nav>

        <router-outlet></router-outlet>

    </div>
</main>
